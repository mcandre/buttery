version: 2

builds:
- main: "src/cmd/{{ .ProjectName }}/main.go"
  binary: "{{ .ProjectName }}/{{ .Os }}/{{ .Arch }}/{{ .ProjectName }}"
  no_unique_dist_dir: true
  # Skip 32-bit ISAs
  # Skip fringe ISAs
  # Skip mobile SDKs
  goos:
  # - "aix"
  # - "android"
  - "darwin"
  - "dragonfly"
  - "freebsd"
  - "illumos"
  # - "ios"
  # - "js"
  - "linux"
  - "netbsd"
  - "openbsd"
  # - "plan9"
  # - "wasip1"
  - "windows"
  goarch:
  # - "386"
  - "amd64"
  # - "arm"
  - "arm64"
  - "loong64"
  # - "mips"
  # - "mips64"
  # - "mips64le"
  # - "mipsle"
  # - "ppc64"
  # - "ppc64le"
  - "riscv64"
  # - "s390x"
  # - "wasm"

archives:
- files:
  # Optimize tarballs
  - "none*"
  formats:
  - "tgz"
  name_template: "{{ .ProjectName }}-ports/{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
  strip_binary_directory: true
